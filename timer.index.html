<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Workout Timer</title>
	<meta name="description" content="Workout timer">
	<meta name="author" content="Szabolcs Szilagyi">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link rel="icon" type="image/png" href="favicon.png">
	<link rel="apple-touch-icon" href="apple-touch-icon.png">
	<link rel="apple-touch-icon-precomposed" href="apple-touch-icon-precomposed.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700;800&display=swap"
		rel="stylesheet">
	<style>
		body {
			font-family: 'Inter', sans-serif;
			transition: background-color 0.5s ease;
			background-color: #e9ecef;
		}

		textarea {
			height: 200px;
		}

		.hidden {
			display: none !important;
		}

		#timer {
			font-family: 'JetBrains Mono', monospace;
			line-height: 0.8;
			margin-top: 1rem;
			font-size: 38vmin;
			font-weight: 800;
			font-variant-numeric: tabular-nums;
			display: inline-block;
			max-width: 100%;
			overflow: hidden;
		}

		#currentExercise {
			line-height: 1.1;
			margin-top: 0.5rem;
			font-size: 11vmin;
			font-weight: 800;
			overflow: hidden;
			text-transform: uppercase;
		}

		#nextExercise {
			margin-top: 0.5rem;
			font-size: 8vmin;
			opacity: 0.7;
			overflow: hidden;
		}

		.workoutDuration {
			color: #198754;
		}

		.restBetweenWorkouts {
			color: #dc3545;
		}

		.container-main {
			margin-top: 1rem;
			margin-bottom: 1rem;
			padding: 1.5rem;
			background: rgba(255, 255, 255, 0.65);
			backdrop-filter: blur(25px);
			-webkit-backdrop-filter: blur(25px);
			border: 1px solid rgba(255, 255, 255, 0.4);
			border-radius: 1.5rem;
			box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
		}

		/* Modern Buttons & Mobile Feedback */
		.btn {
			border-radius: 50px;
			transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
		}

		.btn:hover {
			transform: scale(1.03);
			box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
		}

		.btn:active {
			transform: scale(0.96) !important;
			box-shadow: none !important;
		}

		.action-btn i {
			font-size: 2.5rem;
		}

		.action-btn {
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
		}

		.action-btn.btn-success {
			background-color: rgba(25, 135, 84, 0.65) !important;
			border-color: rgba(25, 135, 84, 0.5) !important;
		}

		.action-btn.btn-warning {
			background-color: rgba(255, 193, 7, 0.65) !important;
			border-color: rgba(255, 193, 7, 0.5) !important;
		}

		.action-btn.btn-danger {
			background-color: rgba(220, 53, 69, 0.65) !important;
			border-color: rgba(220, 53, 69, 0.5) !important;
		}

		@keyframes pulse {
			0% {
				transform: scale(1);
				box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7);
			}

			50% {
				transform: scale(1.03);
				box-shadow: 0 0 0 15px rgba(255, 193, 7, 0);
			}

			100% {
				transform: scale(1);
				box-shadow: 0 0 0 0 rgba(255, 193, 7, 0);
			}
		}

		.pulsing {
			animation: pulse 2s infinite;
		}

		#main-body {
			display: flex;
			align-items: stretch;
			justify-content: space-between;
		}

		#timer-and-exercise {
			min-width: 0;
			overflow: hidden;
		}

		@media (orientation: landscape) and (max-height: 500px) {
			.container-main {
				margin-top: 0.5rem;
				margin-bottom: 0.5rem;
				padding: 0.75rem;
			}

			#timer {
				margin-top: 0.25rem;
				font-size: 30vmin;
			}

			#currentExercise {
				margin-top: 0.25rem;
				font-size: 12vmin;
			}

			#nextExercise {
				margin-top: 0.25rem;
				font-size: 8vmin;
			}

			.action-btn i {
				font-size: 1.5rem;
			}

			#main-body {
				margin-top: 1rem !important;
			}

			h1 {
				font-size: 1.5rem;
				margin-bottom: 0.5rem !important;
			}
		}
	</style>
</head>

<body>
	<script>
		document.addEventListener('DOMContentLoaded', function (event) {
			readUrlParameters()
			setupSwipeAndKeyboardHandlers()
		})

		function setupSwipeAndKeyboardHandlers() {
			let startX = 0;
			const threshold = 50;

			function handleSwipe(endX) {
				const diffX = endX - startX;
				if (diffX > threshold) {
					state.skipPrevious();
				} else if (diffX < -threshold) {
					state.skipNext();
				}
			}

			// Mobile Swipe Solution
			document.body.addEventListener('touchstart', e => {
				startX = e.changedTouches[0].screenX;
			});
			document.body.addEventListener('touchend', e => {
				handleSwipe(e.changedTouches[0].screenX);
			});

			// Desktop Mouse Solution
			let isMouseDown = false;
			document.body.addEventListener('mousedown', e => {
				isMouseDown = true;
				startX = e.screenX;
			});
			document.body.addEventListener('mouseup', e => {
				if (!isMouseDown) return;
				isMouseDown = false;
				handleSwipe(e.screenX);
			});

			// Desktop Keyboard Solution
			document.addEventListener('keydown', e => {
				if (e.key === 'ArrowLeft') {
					state.skipPrevious();
				} else if (e.key === 'ArrowRight') {
					state.skipNext();
				}
			});
		}

		function readUrlParameters() {
			const queryString = window.location.search
			const urlParams = new URLSearchParams(queryString)

			if (urlParams.has('workoutDuration')) {
				document.getElementById("workoutDuration").value = parseInt(urlParams.get('workoutDuration'))
			}
			if (urlParams.has('restBetweenWorkouts')) {
				document.getElementById("restBetweenWorkouts").value = parseInt(urlParams.get('restBetweenWorkouts'))
			}
			if (urlParams.has('restBetweenRounds')) {
				document.getElementById("restBetweenRounds").value = parseInt(urlParams.get('restBetweenRounds'))
			}

			if (urlParams.has('exercises')) {
				document.getElementById("exercises").value = decodeURIComponent(urlParams.get('exercises')).replace(/,/g, ",\n")
			}
		}

		var audioCtx = null;
		var registeredSounds = [];

		/**
		 * Creates/Resumes context immediately.
		 */
		function initAudioCtx() {
			try {
				if (!audioCtx) {
					audioCtx = new (window.AudioContext || window.webkitAudioContext)();
				}
				if (audioCtx.state === 'suspended') {
					audioCtx.resume();
				}
			} catch (e) {
				console.error("AudioContext init failed", e);
			}
		}

		// Global triggers to unlock audio
		window.addEventListener('load', initAudioCtx);
		document.addEventListener('pointerdown', initAudioCtx, { once: true });

		/**
		 * Sound loader. Zero-latency synchronous playback once decoded.
		 */
		function Sound(src) {
			this.buffer = null;
			var self = this;
			registeredSounds.push(this);

			// Fetch and decode immediately on creation
			fetch(src)
				.then(function (r) { return r.arrayBuffer(); })
				.then(function (ab) {
					// Minimal guard to ensure we have a context for decoding
					if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
					audioCtx.decodeAudioData(ab, function (buf) {
						self.buffer = buf;
						console.log("Sound pre-decoded:", src);
					}, function (e) {
						console.error("Decode error:", src, e);
					});
				})
				.catch(function (e) { console.error("Fetch error:", src, e); });

			this.play = function (playbackRate) {
				var rate = playbackRate || 1.0;
				if (self.buffer && audioCtx) {
					if (audioCtx.state === 'suspended') audioCtx.resume();
					var source = audioCtx.createBufferSource();
					source.buffer = self.buffer;
					source.playbackRate.value = rate;
					source.connect(audioCtx.destination);
					source.start(0);
				}
			};
		}

		const commenceRestSound = new Sound("171578__leszek-szary__3-down-1.wav");
		const commenceNextExerciseSound = new Sound("171580__leszek-szary__3-up-1.wav");

		function toPercentage(current, max) {
			const stormThreshold = 5; // finish transition 5s early
			if (max <= stormThreshold) return 1;
			let value = 1 - ((current - stormThreshold) / (max - stormThreshold));
			if (value > 1) value = 1;
			if (value < 0) value = 0;
			return value;
		}

		function getColour(value) {
			// value: progress from 0 (start) to 1 (finish)
			// hue: 20 (red-orange) to 70 (yellow-green)
			// 50 is the range (70–20)
			const startHue = 20
			const endHue = 70
			const range = endHue - startHue
			var hue = (value * range + startHue).toString(10);
			return ["hsl(", hue, ",80%,50%)"].join("");
		}

		function workoutLink() {
			var workoutDuration = document.getElementById("workoutDuration").value
			var restBetweenWorkouts = document.getElementById("restBetweenWorkouts").value
			var restBetweenRounds = document.getElementById("restBetweenRounds").value
			var exercises = document.getElementById("exercises").value

			var url = new URL(window.location.href)
			url.searchParams.set('workoutDuration', encodeURIComponent(workoutDuration))
			url.searchParams.set('restBetweenWorkouts', encodeURIComponent(restBetweenWorkouts))
			url.searchParams.set('restBetweenRounds', encodeURIComponent(restBetweenRounds))
			url.searchParams.set('exercises', encodeURIComponent(exercises.replace(/\n/g, "")))
			return url
		}

		function copyLink() {
			const link = workoutLink()
			const el = document.createElement('textarea');  // Create a <textarea> element
			el.value = link;                                 // Set its value to the string that you want copied
			el.setAttribute('readonly', '');                // Make it readonly to be tamper-proof
			el.style.position = 'absolute';
			el.style.left = '-9999px';                      // Move outside the screen to make it invisible
			document.body.appendChild(el);                  // Append the <textarea> element to the HTML document
			el.select();                                    // Select the <textarea> content
			document.execCommand('copy');                   // Copy - only works as a result of a user action (e.g. click events)
			document.body.removeChild(el);                  // Remove the <textarea> element
			alert("I like the way you roll!\nCopied: " + link);
		}

		function setWorkoutPlan(name) {
			const plans = {
				'Test Workout': {
					duration: 10,
					rest: 5,
					roundRest: 8,
					exercises: 'push up, plank, lunges'
				},
				'Core Workout (easy on shoulders)': {
					duration: 45,
					rest: 0,
					roundRest: 120,
					exercises: 'glute bridge left, glute bridge right, plank, deadbug, dorsal raise, scissor legs, plank reach, sit up, russian twist, aleknas, bird-dog left, bird-dog right, penguin, leg raise, dish hold'
				},
				'Core Workout': {
					duration: 45,
					rest: 0,
					roundRest: 120,
					exercises: 'glute bridge, plank, deadbug, dorsal raise, scissor legs, plank reach, side plank, side plank, aleknas, bird-dog left, bird-dog right, penguin, spiderman plank, dish hold'
				},
				'Tissue Conditioning': {
					duration: 45,
					rest: 0,
					roundRest: 120,
					exercises: 'left lunge, right lunge, bent over row, squats, military press, rdl, high pull-ups, press up'
				}
			}

			const plan = plans[name]
			if (plan) {
				document.getElementById("workoutDuration").value = plan.duration
				document.getElementById("restBetweenWorkouts").value = plan.rest
				document.getElementById("restBetweenRounds").value = plan.roundRest
				document.getElementById("exercises").value = plan.exercises.replace(/, /g, ",\n")

				const url = workoutLink()
				window.history.replaceState({}, '', url)
			}
		}

		var state = new StateMachine()
		var tickingTimer = new Timer()
		var tickWatcher = new TickWatcher()
		var workout = new WorkoutPlan()
		var stateWatcher = new StateWatcher()
		document.addEventListener(tickingTimer.eventNameTick, tickingTimer)
		document.addEventListener(tickingTimer.eventNameTick, tickWatcher)
		document.addEventListener(state.eventNameState, workout)
		document.addEventListener(state.eventNameState, stateWatcher)

		// --- Background column + storm system ---
		var stormIntervalId = null;
		var isStormActive = false;
		var stormColorIndex = 0;
		var currentPhaseDuration = 0;
		var currentRemaining = 0;

		var stormColors = [
			'hsl(0, 90%, 50%)',
			'hsl(20, 90%, 50%)',
			'hsl(40, 90%, 50%)',
			'hsl(60, 90%, 50%)',
			'hsl(80, 90%, 50%)',
			'hsl(100, 90%, 50%)',
			'hsl(120, 90%, 50%)',
			'hsl(100, 90%, 50%)',
			'hsl(80, 90%, 50%)',
			'hsl(60, 90%, 50%)',
			'hsl(40, 90%, 50%)',
			'hsl(20, 90%, 50%)'
		];

		/**
		 * Activates or deactivates the storm colour-cycling effect on the leading column.
		 * @param {boolean} active
		 * @param {number} intervalMs - cycling interval in milliseconds
		 */
		function setStormActive(active, intervalMs) {
			if (active) {
				if (!isStormActive) {
					isStormActive = true;
					stormColorIndex = 0;
					stormIntervalId = setInterval(function () {
						stormColorIndex = (stormColorIndex + 1) % stormColors.length;
						renderBackground();
					}, intervalMs || 180);
				}
			} else {
				if (isStormActive) {
					clearInterval(stormIntervalId);
					stormIntervalId = null;
					isStormActive = false;
				}
			}
		}

		/** Returns a rest-phase colour — same hue ramp as workout but reversed (green left, red-orange right). */
		function getRestColour(colIndex, duration) {
			return getColour(1 - colIndex / duration);
		}

		/** Re-renders the full-background gradient based on current phase state. */
		function renderBackground() {
			const cur = state ? state.current : 'Idle';
			if (cur === 'Workout') {
				renderWorkoutBackground();
			} else if (cur === 'Rest' || cur === 'NextRoundRest') {
				renderRestBackground();
			}
		}

		/** Workout: columns fill left-to-right; leading column shows storm when active. */
		function renderWorkoutBackground() {
			const duration = currentPhaseDuration;
			const remaining = currentRemaining;
			if (duration <= 1) return;
			// Use (duration - 1) columns so the rightmost column is filled at remaining=1.
			const cols = duration - 1;
			const passed = duration - remaining; // elapsed seconds
			const step = 100 / cols;
			const stops = [];
			for (let i = 0; i < cols; i++) {
				const s = i * step;
				const e = (i + 1) * step;
				let color;
				if (i < passed - 1) {
					color = getColour(i / cols);
				} else if (i === passed - 1) {
					// Leading column
					color = isStormActive ? stormColors[stormColorIndex] : getColour(i / cols);
				} else {
					color = 'transparent';
				}
				stops.push(`${color} ${s}%`, `${color} ${e}%`);
			}
			document.body.style.backgroundColor = '';
			document.body.style.background = `linear-gradient(to right, ${stops.join(', ')})`;
		}

		/** Rest: columns drain right-to-left; leading (rightmost visible) column shows storm. */
		function renderRestBackground() {
			const duration = currentPhaseDuration;
			const remaining = currentRemaining;
			if (duration <= 1) return;
			// Use (duration - 1) columns so at remaining=1 only the leftmost column remains.
			const cols = duration - 1;
			const step = 100 / cols;
			const stops = [];
			for (let i = 0; i < cols; i++) {
				const s = i * step;
				const e = (i + 1) * step;
				let color;
				if (i < remaining - 1) {
					color = getRestColour(i, cols);
				} else if (i === remaining - 1) {
					// Leading (rightmost visible) column
					color = isStormActive ? stormColors[stormColorIndex] : getRestColour(i, cols);
				} else {
					color = 'transparent';
				}
				stops.push(`${color} ${s}%`, `${color} ${e}%`);
			}
			document.body.style.backgroundColor = '';
			document.body.style.background = `linear-gradient(to right, ${stops.join(', ')})`;
		}

		function StateMachine() {
			this.eventNameState = 'state'
			this.current = 'Idle'
			this.isPaused = false

			this.updatePlayPauseUI = function () {
				const btn = document.getElementById("playPauseBtn")
				const icon = document.getElementById("playPauseIcon")
				const container = document.querySelector(".container-main")
				if (!btn || !icon || !container) return

				if (this.current === 'Idle' || this.isPaused) {
					icon.className = "bi bi-play-fill"
					btn.classList.remove("btn-warning")
					btn.classList.add("btn-success")
					if (this.isPaused) {
						container.classList.add("pulsing")
					} else {
						container.classList.remove("pulsing")
					}
				} else {
					icon.className = "bi bi-pause-fill"
					btn.classList.remove("btn-success")
					btn.classList.add("btn-warning")
					container.classList.remove("pulsing")
				}
			}

			this.togglePlayPause = function () {
				var self = this;
				if (this.current === 'Idle') {
					this.next();
				} else {
					if (this.isPaused) {
						this.isPaused = false
						tickingTimer.resume()
						// Re-enable storm cycling if it was active when paused
						if (isStormActive) {
							setStormActive(false, 0);
							setStormActive(true, 180);
						}
					} else {
						this.isPaused = true
						tickingTimer.pause()
						// Freeze the storm interval while paused
						if (isStormActive) {
							clearInterval(stormIntervalId);
							stormIntervalId = null;
						}
					}
					this.updatePlayPauseUI()
				}
			}

			this.next = function () {
				this.isPaused = false
				const workoutDuration = parseInt(document.getElementById("workoutDuration").value)
				const raw = document.getElementById("exercises").value
				const exercises = raw.split(/,|\n/).map(s => s.trim()).filter(Boolean)
				const restBetweenWorkouts = parseInt(document.getElementById("restBetweenWorkouts").value)
				const restBetweenRounds = parseInt(document.getElementById("restBetweenRounds").value)

				switch (this.current) {
					case 'Idle':
						console.log('Idle => Workout')
						this.current = 'Workout'
						document.getElementById("nonTimer").classList.add("hidden")
						document.querySelector("h1").classList.add("hidden")
						currentPhaseDuration = workoutDuration;
						currentRemaining = workoutDuration;
						setStormActive(false, 0);
						renderBackground();
						commenceNextExerciseSound.play()
						workout.start(exercises)
						tickingTimer.start(workoutDuration)
						this.signalState(this.current)
						break;
					case 'Workout':
						if (workout.hasNext()) {
							if (restBetweenWorkouts > 0) {
								console.log('Workout => Rest')
								this.current = 'Rest'
								currentPhaseDuration = restBetweenWorkouts;
								currentRemaining = restBetweenWorkouts;
								commenceRestSound.play()
								tickingTimer.start(restBetweenWorkouts)
								this.signalState(this.current)
							} else {
								console.log('Workout => Workout (Rest skipped)')
								this.current = 'Workout'
								currentPhaseDuration = workoutDuration;
								currentRemaining = workoutDuration;
								commenceNextExerciseSound.play()
								tickingTimer.start(workoutDuration)
								this.signalState(this.current)
							}
						} else {
							if (restBetweenRounds > 0) {
								console.log('Workout => NextRoundRest')
								this.current = 'NextRoundRest'
								currentPhaseDuration = restBetweenRounds;
								currentRemaining = restBetweenRounds;
								commenceRestSound.play(0.7)
								tickingTimer.start(restBetweenRounds)
								this.signalState(this.current)
							} else {
								console.log('Workout => Workout (NextRoundRest skipped)')
								this.current = 'Workout'
								currentPhaseDuration = workoutDuration;
								currentRemaining = workoutDuration;
								commenceNextExerciseSound.play()
								workout.start(exercises)
								tickingTimer.start(workoutDuration)
								this.signalState(this.current)
							}
						}
						break;
					case 'Rest':
						console.log('Rest => Workout')
						this.current = 'Workout'
						currentPhaseDuration = workoutDuration;
						currentRemaining = workoutDuration;
						commenceNextExerciseSound.play()
						tickingTimer.start(workoutDuration)
						this.signalState(this.current)
						break;
					case 'NextRoundRest':
						console.log('NextRoundRest => Workout')
						this.current = 'Workout'
						currentPhaseDuration = workoutDuration;
						currentRemaining = workoutDuration;
						commenceNextExerciseSound.play(1.4)
						workout.start(exercises)
						tickingTimer.start(workoutDuration)
						this.signalState(this.current)
						break;
				}
				this.updatePlayPauseUI()
			}
			this.stop = function () {
				console.log('... => Idle')
				this.current = 'Idle'
				this.isPaused = false
				this.updatePlayPauseUI()
				tickingTimer.stop()
				commenceRestSound.play()
				document.getElementById("nonTimer").classList.remove("hidden")
				document.querySelector("h1").classList.remove("hidden")
				document.body.style.backgroundColor = ""
				document.body.style.background = ""
				setStormActive(false, 0);
				currentPhaseDuration = 0;
				currentRemaining = 0;
			}
			this.skipNext = function () {
				if (this.current === 'Idle') return
				this.isPaused = false
				this.updatePlayPauseUI()

				if (workout.currentIndex >= workout.exercises.length) {
					this.current = 'NextRoundRest'
					this.signalState(this.current)
					return
				}

				tickingTimer.stop()
				this.current = 'Workout'

				this.signalState(this.current)
				commenceNextExerciseSound.play()
				var workoutDuration = parseInt(document.getElementById("workoutDuration").value)
				tickingTimer.start(workoutDuration)
			}
			this.skipPrevious = function () {
				if (this.current === 'Idle') return
				this.isPaused = false
				this.updatePlayPauseUI()

				tickingTimer.stop()
				this.current = 'Workout'

				// workout.next() is called when 'Workout' state starts.
				// So when we are in Workout, currentIndex is already pointing to the NEXT one.
				// If we want to go to PREVIOUS exercise:
				// currentIndex points to CURRENT+1.
				// To go to PREVIOUS: we need to set index to CURRENT-1.
				// So we need to decrement by 2.

				workout.previous() // back to current
				workout.previous() // back to previous
				if (workout.currentIndex < 0) workout.currentIndex = 0

				this.signalState(this.current)
				commenceNextExerciseSound.play()
				var workoutDuration = parseInt(document.getElementById("workoutDuration").value)
				tickingTimer.start(workoutDuration)
			}
			this.signalState = function (name) {
				var tick = new CustomEvent(this.eventNameState, {
					bubbles: true,
					detail: { name: name }
				})
				document.dispatchEvent(tick)
			}
		}

		function Timer() {
			this.eventNameTick = 'tick'
			this.remainingSeconds = 0
			this.timeoutRef
			this.isActive = false

			this.start = function (seconds) {
				this.stop()
				this.isActive = true
				this.remainingSeconds = seconds
				this.refreshDisplay()
				this.prepareForNextTick()
			}
			this.stop = function () {
				this.isActive = false
				console.log('Clearing timeout: ' + this.timeoutRef)
				clearTimeout(this.timeoutRef)
			}
			this.pause = function () {
				this.isActive = false
				clearTimeout(this.timeoutRef)
			}
			this.resume = function () {
				if (!this.isActive) {
					this.isActive = true
					this.sleepingBeauty()
				}
			}
			this.refreshDisplay = function () {
				document.getElementById("timer").innerHTML = this.remainingSeconds
			}

			this.sleepingBeauty = function () {
				function whenIWakeUp(name, seconds) {
					const tick = new CustomEvent(name, {
						bubbles: true,
						detail: { remainingSeconds: seconds }
					})
					document.dispatchEvent(tick)
					// console.log('Sleeping beauty is active: ' + tick.detail.remainingSeconds)
				}
				this.timeoutRef = setTimeout(() => whenIWakeUp(this.eventNameTick, this.remainingSeconds), 1000)
			}
			this.prepareForNextTick = function () {
				this.remainingSeconds--
				this.sleepingBeauty()
			}
			this.handleEvent = function (tick) {
				if (!this.isActive) return
				// console.log('Waking up now! ' + tick.detail.remainingSeconds)
				this.refreshDisplay()
				this.prepareForNextTick()
				// console.log('Complition ' + tick.detail.remainingSeconds)
			}
		}

		function WorkoutPlan() {
			this.exercises = []
			this.currentIndex = 0
			this.start = function (ex) {
				this.exercises = ex
				this.currentIndex = 0
			}
			this.next = function () {
				this.currentIndex++
			}
			this.previous = function () {
				if (this.currentIndex > 0) {
					this.currentIndex--
				}
			}
			this.hasNext = function () {
				return this.currentIndex < this.exercises.length
			}
			this.refreshDisplay = function () {
				const current = this.exercises[this.currentIndex]
				const next = this.exercises[this.currentIndex + 1]

				const currentNumber = this.currentIndex + 1
				const nextNumber = this.currentIndex + 2

				if (current) {
					document.getElementById("currentExercise").innerHTML = currentNumber + ". " + current.toUpperCase()
				} else {
					document.getElementById("currentExercise").innerHTML = "{Missing Exercise}"
				}

				if (next) {
					document.getElementById("nextExercise").innerHTML = "up next: " + nextNumber + ". " + next.toLowerCase()
				} else {
					document.getElementById("nextExercise").innerHTML = "up next: rest until next round"
				}
			}

			this.handleEvent = function (stateEvent) {
				if (stateEvent.detail.name === 'Workout') {
					this.refreshDisplay()
					this.next()
				}
			}
		}

		function TickWatcher() {
			this.handleEvent = function (tick) {
				const remaining = tick.detail.remainingSeconds;
				currentRemaining = remaining;

				if (state.current === 'Workout') {
					const workoutDuration = currentPhaseDuration;

					// Audible countdown cues
					if (workoutDuration >= 15) {
						if (remaining === 10) commenceRestSound.play(3.0);
						if (remaining <= 5 && remaining > 0) commenceRestSound.play(2);
					}

					// Storm on leading column for last 5s, off otherwise
					if (remaining <= 5 && remaining > 0) {
						setStormActive(true, 180);
					} else {
						setStormActive(false, 0);
					}
					renderBackground();

				} else if (state.current === 'Rest' || state.current === 'NextRoundRest') {
					if (remaining <= 5 && remaining > 0) {
						setStormActive(true, 180);
					} else {
						setStormActive(false, 0);
					}
					renderBackground();
				}

				if (remaining <= 0) {
					console.log('Timer expired. Next state...')
					tickingTimer.stop()
					state.next()
				}
			}
		}
		function StateWatcher() {
			this.handleEvent = function (stateEvent) {
				switch (stateEvent.detail.name) {
					case 'Workout':
						setStormActive(false, 0);
						document.getElementById("timer").classList.remove("restBetweenWorkouts")
						document.getElementById("timer").classList.add("workoutDuration")
						renderBackground();
						break;
					case 'Rest':
						setStormActive(false, 0);
						document.getElementById("timer").classList.remove("workoutDuration")
						document.getElementById("timer").classList.add("restBetweenWorkouts")
						document.getElementById("currentExercise").innerHTML = "REST"

						const nextExercise = workout.exercises[workout.currentIndex]
						const nextNumber = workout.currentIndex + 1

						if (nextExercise) {
							document.getElementById("nextExercise").innerHTML = "up next: " + nextNumber + ". " + nextExercise.toLowerCase()
						} else {
							document.getElementById("nextExercise").innerHTML = "up next: end of round"
						}
						renderBackground();
						break;
					case 'NextRoundRest':
						setStormActive(false, 0);
						document.getElementById("timer").classList.remove("workoutDuration")
						document.getElementById("timer").classList.add("restBetweenWorkouts")
						document.getElementById("currentExercise").innerHTML = "REST UNTIL NEXT ROUND"
						document.getElementById("nextExercise").innerHTML = "get ready!"
						renderBackground();
						break;
				}
			}
		}
	</script>

	<div class="container container-main shadow-lg">
		<h1 class="text-center mb-5">Workout Timer</h1>
		<div id="nonTimer">
			<div id="workoutPlans" class="row g-2 mb-4">
				<div class="col-12 col-md">
					<button type="button" class="btn btn-outline-primary w-100 h-100"
						onclick="setWorkoutPlan('Test Workout')">
						Test Workout
					</button>
				</div>
				<div class="col-12 col-md">
					<button type="button" class="btn btn-outline-primary w-100 h-100"
						onclick="setWorkoutPlan('Core Workout (easy on shoulders)')">
						Core Workout (easy on shoulders)
					</button>
				</div>
				<div class="col-12 col-md">
					<button type="button" class="btn btn-outline-primary w-100 h-100"
						onclick="setWorkoutPlan('Core Workout')">
						Core Workout
					</button>
				</div>
				<div class="col-12 col-md">
					<button type="button" class="btn btn-outline-primary w-100 h-100"
						onclick="setWorkoutPlan('Tissue Conditioning')">
						Tissue Conditioning
					</button>
				</div>
			</div>
			<div class="row mb-4">
				<div class="col-12 text-center">
					<button type="button" class="btn btn-secondary w-100" onclick="copyLink()" id="copyLink">
						Click to Copy the link of this workout!
					</button>
				</div>
			</div>
			<div class="row">
				<div class="col-md-6">
					<div class="mb-3">
						<label for="workoutDuration" class="form-label">Workout duration in seconds</label>
						<input type="number" id="workoutDuration" class="form-control" name="workoutDuration"
							placeholder="45" value="45" />
					</div>
					<div class="mb-3">
						<label for="restBetweenWorkouts" class="form-label">Rest between workouts in seconds</label>
						<input type="number" id="restBetweenWorkouts" class="form-control" name="restBetweenWorkouts"
							placeholder="15" value="15" />
					</div>
					<div class="mb-3">
						<label for="restBetweenRounds" class="form-label">Rest between rounds in seconds</label>
						<input type="number" id="restBetweenRounds" class="form-control" name="restBetweenRounds"
							placeholder="120" value="120" />
					</div>
				</div>
				<div class="col-md-6">
					<div class="mb-3">
						<label for="exercises" class="form-label">List of Exercises (comma separated)</label>
						<textarea id="exercises" name="exercises" class="form-control"
							placeholder="burpees, push up, plank, sculler sit up, superman, mountain climbers, caterpillars, squat jumps, lunges, triceps dips">burpees,
push up,
plank,
sculler sit up,
superman,
mountain climbers,
caterpillars,
squat jumps,
lunges,
triceps dips</textarea>
					</div>
				</div>
			</div>
		</div>

		<div id="main-body" class="row mt-5 text-center">
			<div id="timer-and-exercise" class="col">
				<p id="timer" class="mb-0">00</p>
				<p id="currentExercise" class="text-uppercase font-weight-bold mb-0">{current exercise}</p>
				<p id="nextExercise" class="text-lowercase">{next exercise}</p>
			</div>
		</div>

		<div class="row g-2 mt-2">
			<div class="col-4">
				<button type="button" id="playPauseBtn" class="btn btn-success btn-lg w-100 action-btn"
					onclick="state.togglePlayPause()">
					<i id="playPauseIcon" class="bi bi-play-fill"></i>
				</button>
			</div>
			<div class="col-4 text-center">
				<p class="text-muted small mt-4"><i class="bi bi-arrow-left"></i> Swipe/Drag to skip <i
						class="bi bi-arrow-right"></i><br><span class="d-none d-md-inline">Or use Left/Right Arrow
						keys</span></p>
			</div>
			<div class="col-4">
				<button type="button" class="btn btn-danger btn-lg w-100 action-btn" onclick="state.stop()">
					<i class="bi bi-stop-fill"></i>
				</button>
			</div>
		</div>
	</div>
</body>
